<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;

}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #020617;
    position: sticky;
    top: 0;
}
nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}
nav a:hover { color: #22c55e; }

/* Hero */
.hero {
    text-align: center;
    padding: 80px 20px;
}
.hero h1 {
    font-size: 42px;
    color: #22c55e;
}
.hero button {
    padding: 12px 25px;
    background: #22c55e;
    border: none;
    cursor: pointer;
}

/* Services */
.services {
    padding: 50px 20px;
    text-align: center;
}
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}
.card {
    background: #1e293b;
    padding: 20px;
    width: 250px;
    border-radius: 10px;
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-10px);
}

/* Contact */
.contact {
    padding: 50px 20px;
    text-align: center;
}
input, textarea {
    width: 80%;
    padding: 10px;
    margin: 10px;
    border: none;
    border-radius: 5px;
}
button.submit {
    background: #22c55e;
    padding: 10px 20px;
    border: none;
}

/* WhatsApp Button */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    text-decoration: none;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}
